name: Baremetrics Plans and Pricing
description: Pricing plans for Baremetrics subscription analytics platform, with tiers based on ARR (Annual Recurring Revenue) range.
url: https://baremetrics.com/pricing
plans:
  - name: Launch
    description: For new businesses and solo founders getting started with subscription analytics.
    price: 75
    unit: month
    currency: USD
    rrDiscount: 35
    targets:
      - New businesses
      - Solo founders
    arrRange: $0 - $360K
    integrations: 1
    features:
      - Subscription Analytics
      - Trial Insights
      - Automated Email Reports
      - Autogenerated Segments
      - Data Enrichment
      - Chat Support

  - name: Growth
    description: For small but growing businesses needing advanced segmentation and integrations.
    price: 255
    unit: month
    currency: USD
    annualDiscount: 35
    popular: true
    targets:
      - Small growing businesses
    arrRange: $360K - $3.6M
    integrations: 2
    features:
      - Subscription Analytics
      - Trial Insights
      - Automated Email Reports
      - Autogenerated Segments
      - Data Enrichment
      - Chat Support
      - Custom Dashboards
      - Unlimited Segmentation
      - Benchmarks
      - Advanced Exports
      - Goal Tracking
      - Slack Integration
      - Intercom Integration

  - name: Scale
    description: For companies needing customized advanced financial planning and unlimited integrations.
    price: 1152
    unit: month
    currency: USD
    annualDiscount: 35
    targets:
      - Enterprise
      - High-growth companies
    arrRange: $3.6M+
    integrations: unlimited
    features:
      - All Growth features
      - Scenario Planning
      - Budget and Expense Tracking
      - Analytics API
      - Dedicated Support Rep

addons:
  - name: Payment Recovery
    description: Turn failed payments into revenue with automated recovery tools.
    price: 129
    unit: month
    currency: USD

  - name: Cancellation Insights
    description: Customizable feedback tools to understand churn reasons and reduce cancellations.
    price: 129
    unit: month
    currency: USD

notes:
  - A 35% annual discount is available across all plans.
  - Analytics API access is only available on the Scale plan.
  - Custom plans available via "Build your own plan" option.
